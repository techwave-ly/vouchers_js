name: Publish Package to npm

# This workflow runs when a new GitHub Release is created
on:
  release:
    types: [published]

jobs:
  npm-publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing via OIDC / Provenance
      id-token: write
      contents: read
    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Set up a Node environment and npm registry
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      # Step 3: Clean install of dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the TypeScript files (which generates the 'dist' folder)
      - name: Build package
        run: npm run build

      # Step 5: Publish the package with provenance using npm's OIDC implementation
      # We rely on Node.js setup-node providing the correct auth handling through OIDC when permissions are set
      - name: Publish to npm
        run: npm publish --provenance --access public
